<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ওয়ান-অন-ওয়ান ডিফেন্ডার ফুটবল গেম</title>
    <style>
        body { text-align: center; background: #222; color: white; font-family: Arial, sans-serif; }
        /* ফুটবল মাঠ */
        #pitch {
            width: 600px;
            height: 400px;
            background: #2ecc71;
            margin: 20px auto;
            position: relative;
            border: 5px solid white;
            overflow: hidden;
        }
        /* মাঝের দাগ */
        #pitch::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
        }
        /* গোলপোস্ট */
        #goal {
            width: 15px;
            height: 100px;
            background: white;
            position: absolute;
            right: 0;
            top: 150px;
        }
        /* প্লেয়ার (লাল) */
        #player {
            width: 30px;
            height: 30px;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: 185px;
            left: 50px;
        }
        /* গোলকিপার (নীল) */
        #goalkeeper {
            width: 30px;
            height: 30px;
            background: blue;
            border-radius: 50%;
            position: absolute;
            top: 185px;
            right: 60px;
        }
        /* ডিফেন্ডার (কমলা) */
        .defender {
            width: 30px;
            height: 30px;
            background: orange;
            border-radius: 50%;
            position: absolute;
            border: 2px solid black;
            transition: border-color 0.3s;
        }
        /* ফুটবল (সাদা) */
        #ball {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 190px;
            left: 200px;
        }
        /* কে আক্রমণ করছে তার ইন্ডিকেটর */
        .active-defender {
            border: 3px solid yellow !important; /* যে তাড়া করছে তার মাথায় হলুদ রিং থাকবে */
        }
    </style>
</head>
<body>

    <h1>আমার ফুটবল গেম v4.0 (ওয়ান-অন-ওয়ান ডিফেন্স)</h1>
    <p>কীবোর্ডের Arrow Keys দিয়ে খেলুন। হলুদ বর্ডারওয়ালা ডিফেন্ডারটি প্রথমে অ্যাটাক করবে, তাকে ডজ দিলে পরের জন আসবে!</p>
    <h2 id="score">স্কোর: 0</h2>

    <div id="pitch">
        <div id="player"></div>
        <div id="goalkeeper"></div>
        <!-- ২ জন ডিফেন্ডার আলাদা আলাদা পজিশনে দাঁড়িয়ে থাকবে -->
        <div id="def1" class="defender" style="left: 300px; top: 150px;"></div>
        <div id="def2" class="defender" style="left: 450px; top: 200px;"></div>
        <div id="ball"></div>
        <div id="goal"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const goalkeeper = document.getElementById('goalkeeper');
        const ball = document.getElementById('ball');
        const scoreText = document.getElementById('score');
        
        const def1El = document.getElementById('def1');
        const def2El = document.getElementById('def2');

        // শুরুর পজিশন
        let playerX = 50, playerY = 185;
        let gkX = 510, gkY = 185;
        let ballX = 200, ballY = 190;
        
        // ডিফেন্ডারদের ডাটা
        let defenders = [
            { el: def1El, startX: 300, startY: 150, x: 300, y: 150, speed: 1.3, active: true },
            { el: def2El, startX: 450, startY: 200, x: 450, y: 200, speed: 1.6, active: false }
        ];
        
        let gkDirection = 1; 
        let score = 0;

        function gameLoop() {
            // ১. গোলকিপার AI (স্বাভাবিকভাবে উপর-নিচ করবে)
            gkY += 3 * gkDirection;
            if (gkY <= 0 || gkY >= 370) {
                gkDirection *= -1;
            }
            goalkeeper.style.top = gkY + 'px';

            // ২. গোলকিপার ও বলের ধাক্কা
            let distBallGk = Math.sqrt(Math.pow(gkX - ballX, 2) + Math.pow(gkY - ballY, 2));
            if (distBallGk < 25) {
                ballX -= 50; 
                ball.style.left = ballX + 'px';
            }

            // ৩. কার আক্রমণ করার কথা তা নির্ধারণ করা (One-by-One Logic)
            // বল যদি ৩০০ পিক্সেলের চেয়ে বামে থাকে, ১ম জন অ্যাটাক করবে। ডজ দিয়ে ডানে চলে গেলে ২য় জন শুরু করবে।
            if (ballX < 320) {
                defenders[0].active = true;
                defenders[1].active = false;
            } else {
                defenders[0].active = false;
                defenders[1].active = true;
            }

            // ৪. ডিফেন্ডারদের মুভমেন্ট
            defenders.forEach((def, index) => {
                if (def.active) {
                    // সক্রিয় ডিফেন্ডারকে হলুদ বর্ডার দিয়ে চিহ্নিত করা
                    def.el.classList.add('active-defender');
                    
                    let dx = ballX - def.x;
                    let dy = ballY - def.y;
                    let distToBall = Math.sqrt(dx*dx + dy*dy);

                    if (distToBall > 5) {
                        def.x += (dx / distToBall) * def.speed;
                        def.y += (dy / distToBall) * def.speed;
                    }

                    // বল কেড়ে নেওয়ার লজিক
                    if (distToBall < 25) {
                        ballX -= 50; 
                        if (ballX < 10) ballX = 10;
                        ball.style.left = ballX + 'px';
                    }
                } else {
                    // নিষ্ক্রিয় ডিফেন্ডার আস্তে আস্তে তার নিজের মূল পজিশনে ফেরত চলে যাবে
                    def.el.classList.remove('active-defender');
                    let dx = def.startX - def.x;
                    let dy = def.startY - def.y;
                    let distToStart = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distToStart > 2) {
                        def.x += (dx / distToStart) * 1.5;
                        def.y += (dy / distToStart) * 1.5;
                    }
                }

                // স্ক্রিনে পজিশন আপডেট
                def.el.style.left = def.x + 'px';
                def.el.style.top = def.y + 'px';
            });

            // ৫. গোল হওয়ার লজিক
            if (ballX >= 580 && ballY >= 150 && ballY <= 250) {
                score++;
                scoreText.innerText = "স্কোর: " + score;
                alert("দারুণ গোল! আপনি ওয়ান-অন-ওয়ান ডিফেন্স ভেঙে দিয়েছেন!");
                resetPosition();
            }

            requestAnimationFrame(gameLoop);
        }

        function resetPosition() {
            playerX = 50; playerY = 185;
            ballX = 200; ballY = 190;
            gkY = 185;
            
            // ডিফেন্ডারদের মূল জায়গায় ফেরত পাঠানো
            defenders.forEach(def => {
                def.x = def.startX;
                def.y = def.startY;
            });

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }

        // কীবোর্ড কন্ট্রোল
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && playerY > 0) playerY -= 15;
            if (e.key === 'ArrowDown' && playerY < 370) playerY += 15;
            if (e.key === 'ArrowLeft' && playerX > 0) playerX -= 15;
            if (e.key === 'ArrowRight' && playerX < 570) playerX += 15;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';

            let distPlayerBall = Math.sqrt(Math.pow(playerX - ballX, 2) + Math.pow(playerY - ballY, 2));
            if (distPlayerBall < 25) {
                ballX += 25; 
                if (e.key === 'ArrowUp') ballY -= 10;
                if (e.key === 'ArrowDown') ballY += 10;
                
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            }
        });

        gameLoop();
    </script>
</body>
</html>
