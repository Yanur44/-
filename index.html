<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো ক্রিকেট চ্যাম্পিয়নশিপ - ফুল ভিজ্যুয়াল মোড</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0f172a; color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; overflow: hidden;
        }

        #stadium-outer {
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #22c55e 30%, #15803d 70%, #14532d 100%);
            position: relative; display: flex; justify-content: center; align-items: center;
        }

        #boundary {
            width: 92vw; height: 92vh;
            border: 4px dashed rgba(255, 255, 255, 0.4);
            border-radius: 50%; position: absolute;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
        }

        #pitch {
            width: 90px; height: 55vh;
            background: linear-gradient(to right, #cfb08c, #dfc49f 25%, #dfc49f 75%, #cfb08c);
            position: absolute; box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }
        .crease { position: absolute; width: 100%; height: 3px; background: rgba(255, 255, 255, 0.85); }
        #bowler-crease { top: 12%; }
        #batsman-crease { bottom: 12%; }

        .stumps-container { position: absolute; left: 33px; width: 24px; display: flex; justify-content: space-between; }
        #bowler-stumps { top: 16%; }
        #batsman-stumps { bottom: 16%; }
        .stump { width: 4px; height: 18px; background: linear-gradient(to right, #f59e0b, #d97706); border-radius: 1px; }

        .hud-container {
            position: absolute; top: 20px; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; pointer-events: none;
        }
        .scoreboard {
            background: rgba(15, 23, 42, 0.9); padding: 12px 25px; border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 16px;
        }
        .scoreboard span { font-weight: bold; color: #22c55e; }
        #status-text {
            background: rgba(15, 23, 42, 0.8); padding: 8px 20px; border-radius: 20px;
            font-size: 15px; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1);
        }
        .controls-panel { pointer-events: auto; display: flex; gap: 10px; }
        .btn {
            background: #ef4444; color: white; border: none; padding: 10px 20px;
            border-radius: 30px; font-size: 14px; cursor: pointer; font-weight: bold;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: scale(1.05); }

        /* প্লেয়ার ডিজাইন */
        .player { position: absolute; width: 26px; height: 40px; z-index: 10; transition: left 0.1s linear, top 0.1s linear; }
        .head { width: 13px; height: 13px; background: #ffdbac; border-radius: 50%; position: absolute; top: 0; left: 6.5px; z-index: 3; }
        .torso { width: 18px; height: 16px; border-radius: 4px; position: absolute; top: 12px; left: 4px; z-index: 2; }
        .arm { width: 4px; height: 14px; position: absolute; top: 13px; z-index: 1; }
        .arm-left { left: 0px; } .arm-right { right: 0px; }
        .leg { width: 6px; height: 14px; background: #fff; position: absolute; bottom: 0; z-index: 1; }
        .leg-left { left: 3px; } .leg-right { right: 3px; }

        .user-team .torso { background: #1d4ed8; }
        .opp-team .torso { background: #ea580c; }
        .runner-active { animation: run-anim 0.2s infinite alternate; }
        @keyframes run-anim {投from { transform: skewX(-10deg); } to { transform: skewX(10deg); } }

        /* ব্যাটসম্যান ও ব্যাটের সঠিক প্লেসমেন্ট */
        #batsman-container { position: absolute; left: 50%; bottom: 12%; transform: translateX(-50%); width: 26px; height: 40px; z-index: 15; }
        #batsman-char { position: relative; left: 0; top: 0; }
        #bat {
            width: 4px; height: 24px; background: #ca8a04; position: absolute;
            left: -8px; top: 14px; transform-origin: top center; transform: rotate(20deg);
            z-index: 20; transition: transform 0.15s;
        }

        /* রানার পার্টনার */
        #runner-char { left: 30px; top: 12%; display: none; }

        /* ডাইনামিক বল */
        #ball {
            width: 12px; height: 12px; background: radial-gradient(circle at 3px 3px, #ff4d4d, #990000);
            border-radius: 50%; position: absolute; left: 0; top: 0; display: none;
            z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.05s linear;
        }

        .instructions {
            position: absolute; bottom: 20px; font-size: 13px; color: rgba(255,255,255,0.6);
            width: 100%; text-align: center; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="stadium-outer">
        <div class="hud-container">
            <div class="scoreboard">
                আপনার রান: <span id="user-score">0</span> &nbsp;|&nbsp;
                চলতি রান (ক্রিজ): <span id="current-run" style="color:#facc15">0</span> &nbsp;|&nbsp;
                উইকেট: <span id="wickets">0</span>
            </div>
            <p id="status-text">খেলতে নিচের বাটনে চাপুন</p>
            <div class="controls-panel">
                <button class="btn" onclick="startDelivery()">নতুন ডেলিভারি</button>
            </div>
        </div>

        <div id="boundary">
            <div id="pitch">
                <div id="bowler-crease" class="crease"></div>
                <div id="batsman-crease" class="crease"></div>
                <div id="bowler-stumps" class="stumps-container"><div class="stump"></div><div class="stump"></div><div class="stump"></div></div>
                <div id="batsman-stumps" class="stumps-container"><div class="stump"></div><div class="stump"></div><div class="stump"></div></div>
                
                <!-- বোলার ও কিপার -->
                <div id="bowler-char" class="player opp-team" style="left: 32px; top: 4%;"></div>
                <div id="keeper-char" class="player opp-team" style="left: 32px; bottom: -8%;"></div>

                <!-- মেইন ব্যাটসম্যান গ্রুপ -->
                <div id="batsman-container">
                    <div id="bat"></div>
                    <div id="batsman-char" class="player user-team"></div>
                </div>

                <!-- নন-স্ট্রাইকার রানার -->
                <div id="runner-char" class="player user-team"></div>
            </div>

            <!-- ফিল্ডারদের পজিশন -->
            <div id="fielder1" class="player opp-team" style="left: 20%; top: 25%;"></div>
            <div id="fielder2" class="player opp-team" style="left: 75%; top: 20%;"></div>
            <div id="fielder3" class="player opp-team" style="left: 15%; top: 65%;"></div>
            <div id="fielder4" class="player opp-team" style="left: 80%; top: 60%;"></div>
            <div id="fielder5" class="player opp-team" style="left: 48%; top: 85%;"></div>

            <div id="ball"></div>
        </div>

        <div class="instructions">
            <b>শট খেলতে:</b> বল কাছে আসলে কিবোর্ডের <b>ArrowUp</b> বা <b>W</b> চাপুন।<br>
            <b>১ রান নিতে:</b> শট খেলার পর ক্রিজে দৌড়াতে <b>Spacebar (স্পেসবার)</b> চাপুন। ১ রান পূর্ণ হলে আবার চাপবেন না।
        </div>
    </div>

    <script>
        // প্লেয়ার অবয়ব তৈরি
        document.querySelectorAll('.player').forEach(p => {
            p.innerHTML = `<div class="head"></div><div class="torso"></div><div class="arm arm-left"></div><div class="arm arm-right"></div><div class="leg leg-left"></div><div class="leg leg-right"></div>`;
        });

        const ball = document.getElementById('ball');
        const bat = document.getElementById('bat');
        const boundary = document.getElementById('boundary');
        const pitch = document.getElementById('pitch');
        const statusText = document.getElementById('status-text');
        
        // ক্যারেক্টার ও ফিল্ডার রেফারেন্স
        const batsmanBox = document.getElementById('batsman-container');
        const batsmanHuman = document.getElementById('batsman-char');
        const runnerHuman = document.getElementById('runner-char');
        const bowlerChar = document.getElementById('bowler-char');
        const fielders = [
            { id: 'fielder1', x: 0, y: 0, origX: 20, origY: 25 },
            { id: 'fielder2', x: 0, y: 0, origX: 75, origY: 20 },
            { id: 'fielder3', x: 0, y: 0, origX: 15, origY: 65 },
            { id: 'fielder4', x: 0, y: 0, origX: 80, origY: 60 },
            { id: 'fielder5', x: 0, y: 0, origX: 48, origY: 85 }
        ];

        let score = 0, pendingRuns = 0, wickets = 0;
        let ballX = 0, ballY = 0, ballVX = 0, ballVY = 0, ballZ = 1; 
        let gameState = "idle"; // idle, bowling, hit, fielder_collecting, throw, running
        let runCountThisShot = 0;
        let batsmanAtStrikerEnd = true;

        // কীবোর্ড পেজ স্ক্রোল বন্ধ করা
        window.addEventListener("keydown", e => { if(["Space","ArrowUp","W","w"].includes(e.key)) e.preventDefault(); });

        function getAbsoluteCoords(element) {
            const rect = element.getBoundingClientRect();
            const boundRect = boundary.getBoundingClientRect();
            return {
                x: rect.left - boundRect.left + rect.width/2,
                y: rect.top - boundRect.top + rect.height/2
            };
        }

        function setBallPos(x, y, z = 1) {
            ballX = x; ballY = y; ballZ = z;
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            ball.style.transform = `scale(${z})`;
        }

        function resetFielders() {
            fielders.forEach(f => {
                const el = document.getElementById(f.id);
                el.style.left = f.origX + '%';
                el.style.top = f.origY + '%';
                const coords = getAbsoluteCoords(el);
                f.x = coords.x; f.y = coords.y;
            });
        }

        function startDelivery() {
            if (wickets >= 3) { statusText.innerText = "গেম ওভার! আপনার মোট রান: " + score; return; }
            resetFielders();
            batsmanHuman.style.top = "0px"; batsmanHuman.style.left = "0px";
            runnerHuman.style.top = "12%"; runnerHuman.style.left = "30px";
            batsmanHuman.classList.remove('runner-active'); runnerHuman.classList.remove('runner-active');
            
            gameState = "bowling";
            runCountThisShot = 0;
            pendingRuns = 0;
            document.getElementById('current-run').innerText = 0;
            statusText.innerText = "বোলার বল করছে...";

            const bCoords = getAbsoluteCoords(bowlerChar);
            setBallPos(bCoords.x, bCoords.y, 1);
            ball.style.display = 'block';

            const batCoords = getAbsoluteCoords(batsmanBox);
            const distanceY = batCoords.y - bCoords.y;
            const time = 60; 

            ballVX = (batCoords.x - bCoords.x) / time;
            ballVY = distanceY / time;
        }

        window.addEventListener('keydown', e => {
            if (gameState === "bowling" && (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) {
                const batCoords = getAbsoluteCoords(batsmanBox);
                const diffY = Math.abs(ballY - batCoords.y);

                bat.style.transform = "rotate(-80deg)";
                setTimeout(() => bat.style.transform = "rotate(20deg)", 150);

                if (diffY < 35) { // পারফেক্ট কানেকশন জোন
                    gameState = "hit";
                    const rand = Math.random();
                    const bRect = boundary.getBoundingClientRect();

                    if (rand > 0.75) { // ছক্কা (গ্যালারিতে যাবে)
                        statusText.innerText = "বিশাল ছক্কা! বল উড়ে গ্যালারিতে গেল!";
                        animateSix(bRect.width / 2, -50);
                    } else if (rand > 0.45) { // চার (বাউন্ডারি পার)
                        statusText.innerText = "দুর্দান্ত চার! বল সীমানার বাইরে!";
                        animateFour(Math.random() > 0.5 ? -20 : bRect.width + 20, bRect.height * 0.3);
                    } else if (rand > 0.25) { // ক্যাচ আউট (আকাশে উঠে ফিল্ডারের হাতে)
                        statusText.innerText = "আউট! আকাশে তুলে ফিল্ডারের হাতে সহজ ক্যাচ!";
                        animateCatch();
                    } else { // ১ রান নেওয়ার সুযোগ মাঠের ভেতর বল
                        statusText.innerText = "মাঠে বল পাঠিয়েছেন! রান নেওয়ার জন্য Spacebar চাপুন!";
                        animateGroundShot(bRect.width * 0.25 + Math.random()*bRect.width*0.5, bRect.height * 0.4);
                    }
                }
            }

            // ম্যানুয়াল সিঙ্গেল রান টেকিং সিস্টেম
            if (gameState === "hit_ground" && e.key === " ") {
                takeRun();
            }
        });

        function animateSix(targetX, targetY) {
            let step = 0; const totalSteps = 90;
            const startX = ballX, startY = ballY;
            
            function frame() {
                step++; const t = step / totalSteps;
                const currentX = startX + (targetX - startX) * t;
                const currentY = startY + (targetY - startY) * t;
                // পারফেক্ট প্যারাবোলা কার্ভ (আকাশে উঠার জন্য Z স্কেল বৃদ্ধি)
                const currentZ = 1 + 2.5 * Math.sin(Math.PI * t); 

                setBallPos(currentX, currentY, currentZ);

                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    score += 6; document.getElementById('user-score').innerText = score;
                    ball.style.display = 'none'; gameState = "idle";
                    statusText.innerText = "ছক্কা! ৬ রান যোগ হলো।";
                }
            }
            frame();
        }

        function animateFour(targetX, targetY) {
            let step = 0; const totalSteps = 70;
            const startX = ballX, startY = ballY;
            function frame() {
                step++; const t = step / totalSteps;
                setBallPos(startX + (targetX - startX) * t, startY + (targetY - startY) * t, 1);
                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    score += 4; document.getElementById('user-score').innerText = score;
                    ball.style.display = 'none'; gameState = "idle";
                    statusText.innerText = "চার! ৪ রান যোগ হলো।";
                }
            }
            frame();
        }

        function animateCatch() {
            const targetFielder = fielders[Math.floor(Math.random() * fielders.length)];
            let step = 0; const totalSteps = 80;
            const startX = ballX, startY = ballY;

            function frame() {
                step++; const t = step / totalSteps;
                const currentX = startX + (targetFielder.x - startX) * t;
                const currentY = startY + (targetFielder.y - startY) * t;
                const currentZ = 1 + 2.0 * Math.sin(Math.PI * t); // আকাশে ওড়ার ইফেক্ট

                setBallPos(currentX, currentY, currentZ);

                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    wickets++; document.getElementById('wickets').innerText = wickets;
                    ball.style.display = 'none'; gameState = "idle";
                    statusText.innerText = "ক্যাচ আউট! ফিল্ডার দারুণ ক্যাচ লুফে নিলেন।";
                }
            }
            frame();
        }

        function animateGroundShot(targetX, targetY) {
            gameState = "hit_ground";
            let step = 0; const totalSteps = 50;
            const startX = ballX, startY = ballY;

            function frame() {
                step++; const t = step / totalSteps;
                setBallPos(startX + (targetX - startX) * t, startY + (targetY - startY) * t, 1);
                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else { fielderCollectBall(targetX, targetY); }
            }
            frame();
        }

        // ফিল্ডার বল কুড়িয়ে ফেরত দেওয়ার সিস্টেম
        function fielderCollectBall(bx, by) {
            gameState = "fielder_collecting";
            let closestFielder = fielders[0];
            let minDist = Math.hypot(fielders[0].x - bx, fielders[0].y - by);

            fielders.forEach(f => {
                let d = Math.hypot(f.x - bx, f.y - by);
                if (d < minDist) { minDist = d; closestFielder = f; }
            });

            const fEl = document.getElementById(closestFielder.id);
            let step = 0; const totalSteps = 40;
            const fStartX = closestFielder.x, fStartY = closestFielder.y;

            function frame() {
                step++; const t = step / totalSteps;
                const curFX = fStartX + (bx - fStartX) * t;
                const curFY = fStartY + (by - fStartY) * t;
                
                fEl.style.left = 'transparent'; // ওভাররাইড পারসেন্টেজ
                fEl.style.left = (curFX - 13) + 'px';
                fEl.style.top = (curFY - 20) + 'px';

                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    statusText.innerText = "ফিল্ডার বল কুড়িয়ে কিপারের দিকে ছুঁড়ে মারছে!";
                    throwBackToKeeper(bx, by);
                }
            }
            frame();
        }

        function throwBackToKeeper(bx, by) {
            gameState = "throw";
            const kCoords = getAbsoluteCoords(document.getElementById('keeper-char'));
            let step = 0; const totalSteps = 40;

            function frame() {
                step++; const t = step / totalSteps;
                setBallPos(bx + (kCoords.x - bx) * t, by + (kCoords.y - by) * t, 1);
                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    ball.style.display = 'none';
                    gameState = "idle";
                    if (pendingRuns > 0) {
                        score += pendingRuns;
                        document.getElementById('user-score').innerText = score;
                        statusText.innerText = `সফলভাবে আপনি ${pendingRuns} রান সম্পন্ন করলেন!`;
                    } else {
                        statusText.innerText = "ডট বল! আপনি কোনো রান নেওয়ার চেষ্টা করেননি।";
                    }
                    pendingRuns = 0;
                    document.getElementById('current-run').innerText = 0;
                }
            }
            frame();
        }

        // ম্যানুয়াল রান নেওয়া (রানিং বিটুইন দ্য উইকেট)
        function takeRun() {
            if (runCountThisShot >= 1) return; // ১ শটে সর্বোচ্চ ১ রান লিমিট
            runCountThisShot++;
            
            batsmanHuman.classList.add('runner-active');
            runnerHuman.classList.add('runner-active');

            let step = 0; const totalSteps = 35;
            
            function frame() {
                step++; const t = step / totalSteps;
                
                if (batsmanAtStrikerEnd) {
                    batsmanHuman.style.top = (-350 * t) + "px"; // পিচ বরাবর দৌড়
                    runnerHuman.style.top = (12 + 65 * t) + "%";
                } else {
                    batsmanHuman.style.top = (-350 + 350 * t) + "px";
                    runnerHuman.style.top = (77 - 65 * t) + "%";
                }

                if (step < totalSteps) { requestAnimationFrame(frame); } 
                else {
                    batsmanHuman.classList.remove('runner-active');
                    runnerHuman.classList.remove('runner-active');
                    batsmanAtStrikerEnd = !batsmanAtStrikerEnd;
                    pendingRuns = 1;
                    document.getElementById('current-run').innerText = pendingRuns;
                    statusText.innerText = "১ রান পূর্ণ হয়েছে! ফিল্ডার বল ফেরত পাঠাচ্ছে।";
                }
            }
            frame();
        }

        function gameLoop() {
            if (gameState === "bowling") {
                setBallPos(ballX + ballVX, ballY + ballVY, 1);
                const batCoords = getAbsoluteCoords(batsmanBox);
                if (ballY > batCoords.y + 40) { // ব্যাটসম্যান মিস করলে বোল্ড আউট
                    gameState = "idle"; ball.style.display = 'none';
                    wickets++; document.getElementById('wickets').innerText = wickets;
                    statusText.innerText = "ক্লিন বোল্ড! মিস করে উইকেট হারালেন।";
                }
            }
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
