<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ডিফেন্ডারসহ ফুটবল গেম</title>
    <style>
        body { text-align: center; background: #222; color: white; font-family: Arial, sans-serif; }
        /* ফুটবল মাঠ */
        #pitch {
            width: 600px;
            height: 400px;
            background: #2ecc71;
            margin: 20px auto;
            position: relative;
            border: 5px solid white;
            overflow: hidden;
        }
        /* মাঝের দাগ */
        #pitch::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
        }
        /* গোলপোস্ট */
        #goal {
            width: 15px;
            height: 100px;
            background: white;
            position: absolute;
            right: 0;
            top: 150px;
        }
        /* প্লেয়ার (লাল) */
        #player {
            width: 30px;
            height: 30px;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: 185px;
            left: 50px;
        }
        /* গোলকিপার (নীল) */
        #goalkeeper {
            width: 30px;
            height: 30px;
            background: blue;
            border-radius: 50%;
            position: absolute;
            top: 185px;
            right: 60px;
        }
        /* ডিফেন্ডার (কমলা) - এদের ক্লাস দিয়ে ডিজাইন করা হয়েছে */
        .defender {
            width: 30px;
            height: 30px;
            background: orange;
            border-radius: 50%;
            position: absolute;
            border: 2px solid black;
        }
        /* ফুটবল (সাদা) */
        #ball {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 190px;
            left: 250px;
        }
    </style>
</head>
<body>

    <h1>আমার ফুটবল গেম v3.0</h1>
    <p>কীবোর্ডের Arrow Keys দিয়ে খেলুন। কমলা ডিফেন্ডারদের এড়িয়ে নীল কিপারকে ফাঁকি দিয়ে গোল দিন!</p>
    <h2 id="score">স্কোর: 0</h2>

    <div id="pitch">
        <div id="player"></div>
        <div id="goalkeeper"></div>
        <!-- ২ জন ডিফেন্ডার -->
        <div id="def1" class="defender" style="left: 350px; top: 100px;"></div>
        <div id="def2" class="defender" style="left: 350px; top: 280px;"></div>
        <div id="ball"></div>
        <div id="goal"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const goalkeeper = document.getElementById('goalkeeper');
        const ball = document.getElementById('ball');
        const scoreText = document.getElementById('score');
        
        // ডিফেন্ডার এলিমেন্ট
        const def1El = document.getElementById('def1');
        const def2El = document.getElementById('def2');

        // শুরুর পজিশন
        let playerX = 50, playerY = 185;
        let gkX = 510, gkY = 185;
        let ballX = 250, ballY = 190;
        
        // ডিফেন্ডারদের ডাটা (পজিশন ও স্পিড)
        let defenders = [
            { el: def1El, x: 350, y: 100, speed: 1.2 },
            { el: def2El, x: 350, y: 280, speed: 0.9 }
        ];
        
        let gkDirection = 1; 
        let score = 0;

        // গেমের মেইন লুপ
        function gameLoop() {
            // ১. গোলকিপার AI
            gkY += 3.5 * gkDirection;
            if (gkY <= 0 || gkY >= 370) {
                gkDirection *= -1;
            }
            goalkeeper.style.top = gkY + 'px';

            // ২. গোলকিপার ও বলের ধাক্কা
            let distBallGk = Math.sqrt(Math.pow(gkX - ballX, 2) + Math.pow(gkY - ballY, 2));
            if (distBallGk < 25) {
                ballX -= 50; 
                ball.style.left = ballX + 'px';
            }

            // ৩. ডিফেন্ডারদের AI (তারা বল তাড়া করবে এবং কেড়ে নেবে)
            defenders.forEach((def) => {
                // বল কোন দিকে আছে সেই হিসাব করা
                let dx = ballX - def.x;
                let dy = ballY - def.y;
                let distToBall = Math.sqrt(dx*dx + dy*dy);

                // ডিফেন্ডাররা বলের দিকে ধেয়ে যাবে
                if (distToBall > 5) {
                    def.x += (dx / distToBall) * def.speed;
                    def.y += (dy / distToBall) * def.speed;
                }

                // স্ক্রিনে ডিফেন্ডারদের পজিশন আপডেট
                def.el.style.left = def.x + 'px';
                def.el.style.top = def.y + 'px';

                // ডিফেন্ডার যদি বল পেয়ে যায় (ট্যাকল/বল কেড়ে নেওয়া)
                if (distToBall < 25) {
                    ballX -= 40; // বলকে পেছনে ধাক্কা মেরে কেড়ে নেবে
                    // বল যাতে মাঠের বাইরে না যায়
                    if (ballX < 10) ballX = 10;
                    ball.style.left = ballX + 'px';
                }
            });

            // ৪. গোল হওয়ার লজিক
            if (ballX >= 580 && ballY >= 150 && ballY <= 250) {
                score++;
                scoreText.innerText = "স্কোর: " + score;
                alert("গোওওওোল! ডিফেন্ডারদের ফাঁকি দিয়ে দারুণ গোল দিলেন!");
                resetPosition();
            }

            requestAnimationFrame(gameLoop);
        }

        // পজিশন রিসেট করার ফাংশন
        function resetPosition() {
            playerX = 50; playerY = 185;
            ballX = 250; ballY = 190;
            gkY = 185;
            
            // ডিফেন্ডারদের আগের জায়গায় ফেরত পাঠানো
            defenders[0].x = 350; defenders[0].y = 100;
            defenders[1].x = 350; defenders[1].y = 280;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }

        // কীবোর্ড লিসেনার (প্লেয়ার মুভমেন্ট)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && playerY > 0) playerY -= 15;
            if (e.key === 'ArrowDown' && playerY < 370) playerY += 15;
            if (e.key === 'ArrowLeft' && playerX > 0) playerX -= 15;
            if (e.key === 'ArrowRight' && playerX < 570) playerX += 15;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';

            // প্লেয়ার ও বলের ধাক্কা লাগার লজিক
            let distPlayerBall = Math.sqrt(Math.pow(playerX - ballX, 2) + Math.pow(playerY - ballY, 2));
            if (distPlayerBall < 25) {
                ballX += 25; 
                if (e.key === 'ArrowUp') ballY -= 10;
                if (e.key === 'ArrowDown') ballY += 10;
                
                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            }
        });

        // গেম স্টার্ট
        gameLoop();
    </script>
</body>
</html>
