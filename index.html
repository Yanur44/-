<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>প্রো ক্রিকেট গেম - আল্টিমেট ফিক্স</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #141d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
            user-select: none;
        }

        /* কন্ট্রোল ড্যাশবোর্ড প্যানেল */
        .dashboard-container {
            width: 1000px;
            background: #1c2a24;
            border: 1px solid #2d4239;
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .row-one {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-box {
            background-color: #0b1310;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #1f332a;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .shot-toggle {
            background-color: #0b1310;
            border: 1px solid #2d4239;
            border-radius: 6px;
            display: flex;
            overflow: hidden;
        }

        .toggle-btn {
            padding: 8px 16px;
            color: #8fa399;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: #1b7a43;
            color: white;
        }

        .new-ball-btn {
            background-color: #d32f2f;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .new-ball-btn:hover { background-color: #b71c1c; }

        .status-bar {
            font-size: 15px;
            color: #00e676;
            font-weight: bold;
            min-height: 20px;
        }

        .instructions-bar {
            font-size: 12px;
            color: #a0b2a6;
            border-top: 1px solid #25382f;
            padding-top: 8px;
            line-height: 1.5;
        }

        /* গ্যালারিসহ স্টেডিয়াম কন্টেইনার */
        .stadium-outer {
            width: 1040px;
            height: 520px;
            background: radial-gradient(circle, #25352e 60%, #111a16 100%);
            border-radius: 50%;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* গ্যালারির স্টেডিয়াম দর্শক */
        .stadium-outer::before {
            content: "••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••";
            position: absolute;
            top: 12px;
            width: 90%;
            color: rgba(255, 255, 255, 0.12);
            font-size: 16px;
            letter-spacing: 4px;
            text-align: center;
            pointer-events: none;
        }

        /* ক্রিকেট খেলার মাঠ */
        .game-field {
            width: 1000px;
            height: 480px;
            background-color: #1b6632; 
            border-radius: 50%;
            border: 3px dashed rgba(255, 255, 255, 0.3);
            position: relative;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
        }

        /* পিচ ডিজাইন */
        .cricket-pitch {
            position: absolute;
            width: 65px;
            height: 240px;
            background: #d2b48c;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-left: 1px solid #c2a278;
            border-right: 1px solid #c2a278;
            z-index: 2;
        }

        .crease {
            width: 100%;
            height: 2px;
            background-color: rgba(255,255,255,0.8);
            position: absolute;
        }
        .crease.top { top: 30px; }
        .crease.bottom { bottom: 30px; }

        .stumps {
            width: 18px;
            display: flex;
            justify-content: space-between;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .stumps.top { top: 18px; }
        .stumps.bottom { bottom: 18px; }

        .stump {
            width: 3px;
            height: 10px;
            background-color: #ffb300;
            border-radius: 1px;
        }

        /* অ্যাথলেটিক ক্রিকেট প্লেয়ার */
        .pro-player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 26px;
            z-index: 4;
        }

        .player-helmet {
            width: 12px;
            height: 13px;
            background-color: #0d47a1;
            border-radius: 6px 6px 3px 3px;
            position: relative;
            margin-bottom: 1px;
        }
        .player-helmet::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: -1px;
            width: 14px;
            height: 2px;
            background: #1565c0;
        }

        .player-jersey {
            width: 24px;
            height: 18px;
            background-color: #1976d2;
            border-radius: 4px 4px 2px 2px;
            position: relative;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
        }

        .team-blue .player-helmet { background-color: #0d47a1; }
        .team-blue .player-jersey { background-color: #1976d2; }
        
        .team-orange .player-helmet { background-color: #e65100; }
        .team-orange .player-helmet::after { background: #f57c00; }
        .team-orange .player-jersey { background-color: #f57c00; }

        /* ক্রিকেট ব্যাট */
        .pro-bat {
            position: absolute;
            width: 4px;
            height: 18px;
            background-color: #d7ccc8;
            border: 1px solid #8d6e63;
            left: -6px;
            top: 0px;
            transform: rotate(-30deg);
            transform-origin: top right;
            border-radius: 1px;
            transition: transform 0.08s ease-out;
        }

        /* গ্রাউন্ড পজিশনস */
        .pos-batsman { left: 50%; transform: translateX(-50%); bottom: 25px; }
        .pos-nonstriker { left: 38%; top: 25%; } /* পিচের পাশে নিরাপদ স্থানে দৃশ্যমান */
        .pos-bowler { top: 20%; left: 48.7%; }
        
        .fielder-left-top { top: 25%; left: 20%; }
        .fielder-left-bottom { top: 68%; left: 18%; }
        .fielder-right-top { top: 22%; left: 75%; }
        .fielder-right-bottom { top: 65%; left: 78%; }

        /* লাল ক্রিকেট বল */
        .cricket-ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff1744; 
            border-radius: 50%;
            top: 24%;
            left: 49.5%;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

    <!-- ড্যাশবোর্ড প্যানেল -->
    <div class="dashboard-container">
        <div class="row-one">
            <div class="score-box">
                আপনার রান: <span id="total-runs" style="color: #ffd54f;">0</span> 
                &nbsp;|&nbsp; চলতি শটে: <span id="current-run" style="color: #ffd54f;">0</span> 
                &nbsp;|&nbsp; উইকেট: <span id="wickets" style="color: #69f0ae;">0</span>
            </div>
            
            <div class="status-bar" id="game-status">ম্যাচ শুরু করতে "নতুন ডেলিভারি" চাপুন</div>

            <div class="btn-group">
                <div class="shot-toggle">
                    <button class="toggle-btn active" id="btn-ground">Ground Shot</button>
                    <button class="toggle-btn" id="btn-loft">Loft Shot</button>
                </div>
                <button class="new-ball-btn" id="btn-new-ball">নতুন ডেলিভারি</button>
            </div>
        </div>
        
        <div class="instructions-bar">
            <b>কন্ট্রোল গাইড:</b> বল ব্যাটারের কাছে পৌঁছালে কীবোর্ডের <b>ArrowUp</b> অথবা <b>W</b> চাপুন শট খেলার জন্য। সিঙ্গেল বা ডাবলস নিতে ফিল্ডার বল ফেরত পাঠানোর আগে যতবার খুশি <b>Spacebar</b> চাপুন।
        </div>
    </div>

    <!-- ক্রিকেট স্টেডিয়াম -->
    <div class="stadium-outer">
        <div class="game-field" id="field">
            
            <div class="cricket-pitch">
                <div class="crease top"></div>
                <div class="stumps top"><div class="stump"></div><div class="stump"></div><div class="stump"></div></div>

                <div class="crease bottom"></div>
                <div class="stumps bottom" id="target-stumps"><div class="stump"></div><div class="stump"></div><div class="stump"></div></div>

                <!-- মেইন স্ট্রাইকার ব্যাটার -->
                <div class="pro-player team-blue pos-batsman" id="batsman">
                    <div class="player-helmet"></div>
                    <div class="player-jersey"><div class="pro-bat" id="bat"></div></div>
                </div>
            </div>

            <!-- নন-স্ট্রাইকার ব্যাটার -->
            <div class="pro-player team-blue pos-nonstriker">
                <div class="player-helmet"></div>
                <div class="player-jersey"></div>
            </div>

            <!-- বল -->
            <div class="cricket-ball" id="ball"></div>

            <!-- ফিল্ডিং টিম এবং বোলার -->
            <div class="pro-player team-orange fielder-left-top"><div class="player-helmet"></div><div class="player-jersey"></div></div>
            <div class="pro-player team-orange fielder-left-bottom"><div class="player-helmet"></div><div class="player-jersey"></div></div>
            <div class="pro-player team-orange fielder-right-top"><div class="player-helmet"></div><div class="player-jersey"></div></div>
            <div class="pro-player team-orange fielder-right-bottom"><div class="player-helmet"></div><div class="player-jersey"></div></div>
            <div class="pro-player team-orange pos-bowler"><div class="player-helmet"></div><div class="player-jersey"></div></div>

        </div>
    </div>

    <script>
        let totalRuns = 0;
        let currentShotRuns = 0;
        let wickets = 0;
        let isBallFlying = false;
        let isBallBowled = false;
        let ballTimer = null;
        let shotType = 'ground';
        let runAllowed = false;

        const ball = document.getElementById('ball');
        const bat = document.getElementById('bat');
        const batsman = document.getElementById('batsman');
        const targetStumps = document.getElementById('target-stumps');
        const gameStatus = document.getElementById('game-status');
        const totalRunsText = document.getElementById('total-runs');
        const currentRunText = document.getElementById('current-run');
        const wicketsText = document.getElementById('wickets');
        const btnNewBall = document.getElementById('btn-new-ball');
        const btnGround = document.getElementById('btn-ground');
        const btnLoft = document.getElementById('btn-loft');

        btnGround.addEventListener('click', () => {
            shotType = 'ground';
            btnGround.classList.add('active');
            btnLoft.classList.remove('active');
        });

        btnLoft.addEventListener('click', () => {
            shotType = 'loft';
            btnLoft.classList.add('active');
            btnGround.classList.remove('active');
        });

        btnNewBall.addEventListener('click', () => {
            if (isBallBowled) return; 
            
            isBallBowled = true;
            isBallFlying = false;
            runAllowed = false;
            currentShotRuns = 0;
            currentRunText.innerText = 0;
            gameStatus.innerText = "বোলার বল ছুড়ল! রেডি থাকুন...";
            gameStatus.style.color = "#ffd54f";
            
            ball.style.display = 'block';
            ball.style.top = '24%';
            ball.style.left = '49.5%';

            let ballTop = 24;
            
            // রিয়ালিস্টিক স্মুথ এবং কন্ট্রোল্ড বল স্পিড
            ballTimer = setInterval(() => {
                ballTop += 1.0; 
                ball.style.top = ballTop + '%';

                // পিক্সেল চেক লজিক: বল ব্যাটার বা স্টাম্প পজিশন ক্রস করলে বোল্ড
                let ballRect = ball.getBoundingClientRect();
                let stumpRect = targetStumps.getBoundingClientRect();

                if (ballRect.bottom >= stumpRect.top + 5) {
                    clearInterval(ballTimer);
                    if (!isBallFlying) {
                        wickets++;
                        wicketsText.innerText = wickets;
                        gameStatus.innerText = "বোল্ড আউট! নিখুঁত ডেলিভারি 🎯";
                        gameStatus.style.color = "#ff1744";
                        endDelivery();
                    }
                }
            }, 16);
        });

        function playShot() {
            if (!isBallBowled || isBallFlying) return;

            // ব্যাট সুইং অ্যানিমেশন ট্র্রিগার
            bat.style.transform = 'rotate(-110deg)';
            setTimeout(() => { bat.style.transform = 'rotate(-30deg)'; }, 150);

            // পিক্সেল এক্যুরেট কোলিশন ডিটেকশন (getBoundingClientRect)
            let ballRect = ball.getBoundingClientRect();
            let batsmanRect = batsman.getBoundingClientRect();

            // বলের সেন্টার এবং ব্যাটারের সেন্টার এর রেঞ্জ চেক
            if (ballRect.bottom >= batsmanRect.top - 20 && ballRect.top <= batsmanRect.bottom + 10) {
                clearInterval(ballTimer);
                isBallFlying = true;
                
                if (shotType === 'loft' && Math.random() > 0.4) {
                    gameStatus.innerText = "দুর্দান্ত শট! ছক্কা! 🚀";
                    gameStatus.style.color = "#69f0ae";
                    animateBallOut(6);
                } else if (Math.random() > 0.55) {
                    gameStatus.innerText = "দারুণ টাইমিং! চার হলো! ⚡";
                    gameStatus.style.color = "#69f0ae";
                    animateBallOut(4);
                } else {
                    gameStatus.innerText = "গ্যাপে শট! রান নেওয়ার জন্য Spacebar চাপুন!";
                    gameStatus.style.color = "#ffffff";
                    runAllowed = true;
                    animateBallField();
                }
            } else {
                gameStatus.innerText = "টাইমিং মিস! বিট হলেন।";
                gameStatus.style.color = "#a0b2a6";
            }
        }

        // মাঠের বাইরে বাউন্ডারিতে বল যাওয়ার অ্যানিমেশন
        function animateBallOut(runs) {
            let ballTop = parseFloat(ball.style.top);
            let ballLeft = parseFloat(ball.style.left);
            let angle = (Math.random() - 0.5) * 5; // ছিটকে যাওয়ার কোণ

            const flyTimer = setInterval(() => {
                ballTop += 4; // বল ব্যাটারের দিক থেকে মাঠের নিচের দিকে যাবে
                ballLeft += angle;
                ball.style.top = ballTop + '%';
                ball.style.left = ballLeft + '%';

                if (ballTop >= 105 || ballLeft <= -5 || ballLeft >= 105) {
                    clearInterval(flyTimer);
                    totalRuns += runs;
                    currentShotRuns = runs;
                    totalRunsText.innerText = totalRuns;
                    currentRunText.innerText = currentShotRuns;
                    endDelivery();
                }
            }, 16);
        }

        // মাঠের ভেতরে সিঙ্গেল/ডাবল রানের জন্য বল ড্রপ অ্যানিমেশন
        function animateBallField() {
            let ballTop = parseFloat(ball.style.top);
            let ballLeft = parseFloat(ball.style.left);
            
            let targetTop = 60 + Math.random() * 20;
            let targetLeft = 20 + Math.random() * 60;

            const fieldTimer = setInterval(() => {
                ballTop += (targetTop - ballTop) * 0.08;
                ballLeft += (targetLeft - ballLeft) * 0.08;
                ball.style.top = ballTop + '%';
                ball.style.left = ballLeft + '%';

                if (Math.abs(ballTop - targetTop) < 1) {
                    clearInterval(fieldTimer);
                    
                    // ৩ সেকেন্ড সময় থাকবে রান নেওয়ার, তারপর ফিল্ডার বল থ্রো করবে
                    setTimeout(() => {
                        runAllowed = false;
                        gameStatus.innerText = "ফিল্ডার বল ফেরত পাঠিয়েছে।";
                        endDelivery();
                    }, 3000);
                }
            }, 20);
        }

        // রান নেওয়ার স্পেসবার ফাংশন
        function takeRun() {
            if (runAllowed && currentShotRuns < 3) {
                currentShotRuns++;
                totalRuns++;
                currentRunText.innerText = currentShotRuns;
                totalRunsText.innerText = totalRuns;
            }
        }

        function endDelivery() {
            isBallBowled = false;
            isBallFlying = false;
            runAllowed = false;
        }

        // কীবোর্ড বাইন্ডিং ফিক্স
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                playShot();
            }
            if (e.code === 'Space') {
                e.preventDefault(); // পেজ স্ক্রোল ডাউন হওয়া বন্ধ করবে
                takeRun();
            }
        });
    </script>
</body>
</html>
