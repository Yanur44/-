<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>নোকিয়া রেট্রো ফুটবল গেম</title>
    <style>
        body { 
            text-align: center; 
            background: #111; 
            color: #39FF14; /* ক্লাসিক নোকিয়া গ্রিন লাইট কালার */
            font-family: 'Courier New', Courier, monospace; /* রেট্রো ফন্ট */
        }
        /* নোকিয়া বাটন ফোনের স্ক্রিন সাইজ (পিক্সেল আর্ট ফিল) */
        #nokia-screen {
            width: 320px;
            height: 240px;
            background: #0d3a1a; /* গাঢ় সবুজ ক্লাসিক মাঠ */
            margin: 20px auto;
            position: relative;
            border: 8px solid #333; /* ফোনের বর্ডার */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            image-rendering: pixelated; /* পিক্সেল লুক দেওয়ার জন্য */
        }
        /* মাঠের রেখা */
        .line {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }
        #center-line {
            height: 100%;
            left: 50%;
            top: 0;
        }
        /* গোলপোস্ট */
        #goal {
            width: 8px;
            height: 60px;
            background: #fff;
            position: absolute;
            right: 0;
            top: 90px;
            border-left: 2px solid #000;
        }
        /* প্লেয়ার ও বল (নোকিয়া ফোনের মতো চারকোনা বা পিক্সেল ডট) */
        .pixel-sprite {
            position: absolute;
            width: 12px;
            height: 12px;
        }
        #player {
            background: #ff3333; /* লাল প্লেয়ার */
            border: 1px solid #fff;
        }
        #goalkeeper {
            background: #3333ff; /* নীল কিপার */
            border: 1px solid #fff;
        }
        .defender {
            background: #ff9900; /* কমলা ডিফেন্ডার */
            border: 1px solid #000;
        }
        #ball {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%; /* গোল বল */
            box-shadow: 1px 1px 0 #000;
        }
        /* কন্ট্রোল প্যানেল */
        .controls-info {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>NOKIA FOOTBALL 2D</h1>
    <p>স্কোর: <span id="score">0</span></p>

    <div id="nokia-screen">
        <!-- মাঠের সেন্টার লাইন -->
        <div id="center-line" class="line"></div>
        
        <!-- গেম অবজেক্টস -->
        <div id="player" class="pixel-sprite" style="left: 30px; top: 114px;"></div>
        <div id="goalkeeper" class="pixel-sprite" style="left: 280px; top: 114px;"></div>
        <div id="def1" class="pixel-sprite defender" style="left: 150px; top: 50px;"></div>
        <div id="def2" class="pixel-sprite defender" style="left: 220px; top: 150px;"></div>
        <div id="ball" style="position: absolute; left: 100px; top: 116px;"></div>
        <div id="goal"></div>
    </div>

    <div class="controls-info">
        <p>কন্ট্রোল: কীবোর্ডের <b>Arrow Keys</b> অথবা বাটন ফোনের মতো <b>W, A, S, D</b> ব্যবহার করুন।</p>
    </div>

    <script>
        const player = document.getElementById('player');
        const goalkeeper = document.getElementById('goalkeeper');
        const ball = document.getElementById('ball');
        const scoreText = document.getElementById('score');
        
        const def1El = document.getElementById('def1');
        const defendersData = [
            { el: def1El, startX: 150, startY: 50, x: 150, y: 50, speed: 0.8, active: true },
            { el: document.getElementById('def2'), startX: 220, startY: 150, x: 220, y: 150, speed: 1.0, active: false }
        ];

        // শুরুর পজিশন (৩২০x২৪০ স্ক্রিন অনুযায়ী ছোট করা হয়েছে)
        let playerX = 30, playerY = 114;
        let gkX = 280, gkY = 114;
        let ballX = 100, ballY = 116;
        
        let gkDirection = 1; 
        let score = 0;

        function gameLoop() {
            // ১. রেট্রো স্টাইল গোলকিপার (ধীরে ধীরে উপর-নিচ করবে)
            gkY += 1.5 * gkDirection;
            if (gkY <= 90 || gkY >= 140) {
                gkDirection *= -1;
            }
            goalkeeper.style.top = gkY + 'px';

            // গোলকিপার বল আটকে দেওয়া
            let distBallGk = Math.sqrt(Math.pow(gkX - ballX, 2) + Math.pow(gkY - ballY, 2));
            if (distBallGk < 14) {
                ballX -= 30; 
                ball.style.left = ballX + 'px';
            }

            // ২. নোকিয়া ওয়ান-বাই-ওয়ান ডিফেন্ডার লজিক
            if (ballX < 160) {
                defendersData[0].active = true;
                defendersData[1].active = false;
            } else {
                defendersData[0].active = false;
                defendersData[1].active = true;
            }

            defendersData.forEach((def) => {
                if (def.active) {
                    let dx = ballX - def.x;
                    let dy = ballY - def.y;
                    let distToBall = Math.sqrt(dx*dx + dy*dy);

                    if (distToBall > 2) {
                        def.x += (dx / distToBall) * def.speed;
                        def.y += (dy / distToBall) * def.speed;
                    }

                    // ডিফেন্ডার বল ট্যাকল করলে বল পেছনে চলে যাবে
                    if (distToBall < 14) {
                        ballX -= 25; 
                        if (ballX < 10) ballX = 10;
                        ball.style.left = ballX + 'px';
                    }
                } else {
                    // নিষ্ক্রিয় হলে ধীরে ফিরে যাবে
                    let dx = def.startX - def.x;
                    let dy = def.startY - def.y;
                    let distToStart = Math.sqrt(dx*dx + dy*dy);
                    if (distToStart > 2) {
                        def.x += (dx / distToStart) * 1.0;
                        def.y += (dy / distToStart) * 1.0;
                    }
                }
                def.el.style.left = def.x + 'px';
                def.el.style.top = def.y + 'px';
            });

            // ৩. গোল হওয়ার লজিক (ছোট গোলপোস্ট)
            if (ballX >= 310 && ballY >= 90 && ballY <= 150) {
                score++;
                scoreText.innerText = score;
                alert("GOAL!!");
                resetPosition();
            }

            requestAnimationFrame(gameLoop);
        }

        function resetPosition() {
            playerX = 30; playerY = 114;
            ballX = 100; ballY = 116;
            gkY = 114;
            defendersData.forEach(def => {
                def.x = def.startX;
                def.y = def.startY;
            });
            updateElements();
        }

        function updateElements() {
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }

        // বাটন ফোনের কীবোর্ড কন্ট্রোল (W/A/S/D এবং Arrows)
        window.addEventListener('keydown', (e) => {
            const step = 10; // পিক্সেল স্টেপ মুভমেন্ট
            
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && playerY > 5) playerY -= step;
            if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && playerY < 220) playerY += step;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && playerX > 5) playerX -= step;
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && playerX < 300) playerX += step;

            updateElements();

            // প্লেয়ার ও বলের রেট্রো কোলাইডার
            let distPlayerBall = Math.sqrt(Math.pow(playerX - ballX, 2) + Math.pow(playerY - ballY, 2));
            if (distPlayerBall < 14) {
                ballX += 15; 
                // বলের কোনাকুনি ড্রিবলিং ইফেক্ট
                if (e.key === 'ArrowUp' || e.key === 'w') ballY -= 8;
                if (e.key === 'ArrowDown' || e.key === 's') ballY += 8;
                
                // বাউন্ডারি চেক
                if (ballY < 5) ballY = 5;
                if (ballY > 230) ballY = 230;

                updateElements();
            }
        });

        gameLoop();
    </script>
</body>
</html>
