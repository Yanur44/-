<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ক্রিকেট গেম</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1c2826;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* ১ম স্ক্রিনশটের হুবহু সবুজ মাঠ */
        .game-field {
            width: 1000px;
            height: 480px;
            background-color: #1f783c; 
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.5); /* বাউন্ডারি ওভাল */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        /* ওপরে কালো স্কোরবোর্ড */
        .top-ui {
            background-color: #11261d;
            color: white;
            padding: 8px 30px;
            border-radius: 20px;
            font-size: 15px;
            z-index: 5;
        }

        /* মাঝখানের টেক্সট এবং কন্ট্রোল প্যানেল */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 5;
            margin-top: -10px;
        }

        .info-msg {
            color: white;
            font-size: 16px;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .shot-toggle {
            background-color: #1e332a;
            border: 2px solid #2d4f3e;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
        }

        .toggle-btn {
            padding: 8px 18px;
            color: #8fa399;
            border: none;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
        }

        .toggle-btn.active {
            background-color: #2e7d32;
            color: white;
        }

        .new-ball-btn {
            background-color: #e53935;
            color: white;
            padding: 8px 22px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ------------------------------------------------ */
        /* ফিক্সড পিচ এবং নিখুঁত ২ডি উইকেটের পজিশন */
        /* ------------------------------------------------ */
        .cricket-pitch {
            position: absolute;
            width: 75px;
            height: 250px;
            background-color: #d7bc9b; /* পিচের আসল কালার */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -40%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0; /* ক্রিজ লাইনের ইনসেট পজিশনিং */
        }

        /* সাদা ক্রিজ লাইন */
        .bowling-crease {
            width: 100%;
            height: 2px;
            background-color: white;
            position: absolute;
        }
        .bowling-crease.top { top: 35px; }
        .bowling-crease.bottom { bottom: 35px; }

        /* স্টাম্পস/উইকেট (৩টি কাঠের কাঠি) */
        .wicket-stumps {
            width: 20px;
            display: flex;
            justify-content: space-between;
            position: absolute;
            z-index: 3;
        }
        .wicket-stumps.top { top: 22px; }
        .wicket-stumps.bottom { bottom: 22px; }

        .stump-stick {
            width: 3.5px;
            height: 12px;
            background-color: #e08e39; /* স্টাম্পের রঙ */
            border-radius: 1px;
        }

        /* ------------------------------------------------ */
        /* আপনার আসল মানুষের মতো দেখতে প্লেয়ার ডিজাইন (CSS Sprite) */
        /* ------------------------------------------------ */
        .human-player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20px;
            z-index: 4;
        }

        /* প্লেয়ারের গোল মাথা */
        .player-head {
            width: 14px;
            height: 14px;
            background-color: #ffcc99; /* গায়ের রঙ */
            border-radius: 50%;
            margin-bottom: -2px;
            z-index: 2;
        }

        /* প্লেয়ারের জার্সি/বডি (চারকোনা ও নিচে সাদা বর্ডার) */
        .player-body {
            width: 18px;
            height: 16px;
            border-bottom: 4px solid white; /* নিচে সাদা দাগ/প্যান্ট */
            border-radius: 2px;
        }

        /* জার্সি কালার কোড */
        .blue-team .player-body { background-color: #2979ff; } /* নীল ব্যাটার */
        .orange-team .player-body { background-color: #ff6d00; } /* কমলা ফিল্ডার ও বোলার */

        /* পিচের ভেতরের প্লেয়ারদের সঠিক পজিশন */
        .batsman-pos {
            left: 50%;
            transform: translateX(-50%);
            bottom: 38px; /* উইকেটের ঠিক সামনে ক্রিজের ওপর */
        }
        .bowler-pos {
            left: 50%;
            transform: translateX(-50%);
            top: 3px; /* বোলার এন্ডের উইকেটের পেছনে */
        }

        /* মাঠের চারপাশের ফিল্ডারদের অবস্থান (১ম স্ক্রিনশটের মতো) */
        .fielder-1 { top: 28%; left: 23%; }
        .fielder-2 { top: 62%; left: 18%; }
        .fielder-3 { top: 24%; left: 73%; }
        .fielder-4 { top: 58%; left: 78%; }

        /* নিচের নোটিশ ও নির্দেশনাবলী */
        .bottom-ui {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            font-size: 13px;
            line-height: 1.6;
            z-index: 5;
        }
        .warning {
            color: #ffeb3b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-field">
        
        <!-- ১. ওপরের স্কোরবোর্ড -->
        <div class="top-ui">
            আপনার রান: <span style="color: #ffeb3b;">0</span> | চলতি শটে রান: <span style="color: #ffeb3b;">0</span> | উইকেট: <span style="color: #00e676;">0</span>
        </div>

        <!-- ২. কন্ট্রোল বাটন ও মেসেজ -->
        <div class="controls">
            <div class="info-msg">খেলতে নতুন ডেলিভারি বাটনে চাপুন</div>
            <div class="btn-row">
                <div class="shot-toggle">
                    <button class="toggle-btn active">Ground Shot</button>
                    <button class="toggle-btn">Loft Shot</button>
                </div>
                <button class="new-ball-btn">নতুন ডেলিভারি</button>
            </div>
        </div>

        <!-- ৩. মূল পিচ ও পজিশন ফিক্সড উইকেট -->
        <div class="cricket-pitch">
            <!-- বোলার এন্ডের ক্রিজ ও উইকেট -->
            <div class="bowling-crease top"></div>
            <div class="wicket-stumps top">
                <div class="stump-stick"></div>
                <div class="stump-stick"></div>
                <div class="stump-stick"></div>
            </div>

            <!-- ব্যাটার এন্ডের ক্রিজ ও উইকেট -->
            <div class="bowling-crease bottom"></div>
            <div class="wicket-stumps bottom">
                <div class="stump-stick"></div>
                <div class="stump-stick"></div>
                <div class="stump-stick"></div>
            </div>

            <!-- পিচের ভেতরের প্লেয়ার (মানুষের অবয়বে) -->
            <!-- বোলার/নন-স্ট্রাইকার -->
            <div class="human-player blue-team bowler-pos">
                <div class="player-head"></div>
                <div class="player-body"></div>
            </div>
            <!-- স্ট্রাইকার ব্যাটার (উইকেটের সামনে নিখুঁত পজিশনে) -->
            <div class="human-player blue-team batsman-pos">
                <div class="player-head"></div>
                <div class="player-body"></div>
            </div>
        </div>

        <!-- ৪. মাঠের চারপাশের ফিল্ডাররা (কমলা জার্সি ও মানুষের অবয়ব) -->
        <div class="human-player orange-team fielder-1"><div class="player-head"></div><div class="player-body"></div></div>
        <div class="human-player orange-team fielder-2"><div class="player-head"></div><div class="player-body"></div></div>
        <div class="human-player orange-team fielder-3"><div class="player-head"></div><div class="player-body"></div></div>
        <div class="human-player orange-team fielder-4"><div class="player-head"></div><div class="player-body"></div></div>

        <!-- বোলার (ওপরে উইকেটের সোজা পাশে দাঁড়ানো ফিল্ডার/বোলার) -->
        <div class="human-player orange-team" style="top: 30%; left: 49.3%;"><div class="player-head"></div><div class="player-body"></div></div>

        <!-- ৫. নিচের নির্দেশনাবলী -->
        <div class="bottom-ui">
            শট খেলতে: বল কাছে আসলে কিবোর্ডের ArrowUp বা W চাপুন।<br>
            ম্যানুয়াল রান নিতে: শট খেলার পর যতবার খুশি রান নিতে Spacebar (স্পেসবার) চাপুন।<br>
            <span class="warning">⚠ সতর্কবার্তা: ফিল্ডার বল ফেরত পাঠানোর আগে ক্রিজে না পৌঁছালে আপনি রান আউট হবেন!</span>
        </div>

    </div>

</body>
</html>
