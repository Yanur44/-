<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>নোকিয়া রেট্রো ক্রিকেট গেম</title>
    <style>
        body { 
            text-align: center; 
            background: #111; 
            color: #39FF14; /* ক্লাসিক নোকিয়া গ্রিন */
            font-family: 'Courier New', Courier, monospace; 
        }
        /* নোকিয়া বাটন ফোনের স্ক্রিন সাইজ (৩২০x২৪০) */
        #nokia-screen {
            width: 320px;
            height: 240px;
            background: #1e5e2f; /* সবুজ স্টেডিয়াম */
            margin: 20px auto;
            position: relative;
            border: 8px solid #333; 
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            overflow: hidden;
        }
        /* ক্রিকেট পিচ */
        #pitch {
            width: 45px;
            height: 240px;
            background: #d2b48c; /* মাটির কালার পিচ */
            position: absolute;
            left: 137px;
            top: 0;
            border-left: 2px dashed rgba(255,255,255,0.4);
            border-right: 2px dashed rgba(255,255,255,0.4);
        }
        /* স্টাম্প */
        .stumps {
            width: 20px;
            height: 4px;
            background: #fff;
            position: absolute;
            left: 150px;
        }
        #bowler-stumps { top: 30px; }
        #batsman-stumps { bottom: 30px; }

        /* প্লেয়ার ও বল */
        .pixel-sprite {
            position: absolute;
            width: 14px;
            height: 14px;
        }
        #batsman {
            background: #ff3333; /* লাল ব্যাটসম্যান */
            left: 153px;
            bottom: 35px;
            border-radius: 2px;
        }
        #bat {
            width: 4px;
            height: 16px;
            background: #ffcc00; /* হলুদ ব্যাট */
            position: absolute;
            left: 148px;
            bottom: 35px;
            transform-origin: bottom center;
            transition: transform 0.1s;
        }
        #ball {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            left: 157px;
            top: 40px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>NOKIA CRICKET 2D</h1>
    <p>স্কোর: <span id="score">0</span> | উইকেট: <span id="wickets">0</span></p>
    <p id="status-text" style="color: #fff; font-size: 14px;">বল ফেস করতে '৫' অথবা 'ArrowUp' চাপুন!</p>

    <div id="nokia-screen">
        <div id="pitch"></div>
        <div id="bowler-stumps" class="stumps"></div>
        <div id="batsman-stumps" class="stumps"></div>
        
        <div id="batsman" class="pixel-sprite"></div>
        <div id="bat"></div>
        <div id="ball"></div>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const bat = document.getElementById('bat');
        const scoreText = document.getElementById('score');
        const wicketsText = document.getElementById('wickets');
        const statusText = document.getElementById('status-text');

        let score = 0;
        let wickets = 0;
        let ballY = 40;
        let ballSpeed = 3;
        let isBallLive = false;
        let canHit = false;

        // বোলার নিজে থেকে বল করার ফাংশন
        function bowl() {
            if (wickets >= 3) {
                statusText.innerText = "গেম ওভার! আপনার ফাইনাল স্কোর: " + score;
                return;
            }
            
            ballY = 40;
            ball.style.top = ballY + 'px';
            ball.style.display = 'block';
            isBallLive = true;
            canHit = true;
            statusText.innerText = "বল আসছে... নজর রাখুন!";
            
            // বলের গতি প্রতিবার একটু কম-বেশি হবে (নোকিয়া এআই)
            ballSpeed = 2.5 + Math.random() * 2;
        }

        // গেমের মেইন লুপ
        function gameLoop() {
            if (isBallLive) {
                ballY += ballSpeed;
                ball.style.top = ballY + 'px';

                // বল যদি ব্যাটসম্যানের লাইন পার হয়ে যায় (বোল্ড আউট)
                if (ballY > 210) {
                    isBallLive = false;
                    ball.style.display = 'none';
                    wickets++;
                    wicketsText.innerText = wickets;
                    statusText.innerText = "আউট!! বোল্ড হয়ে গেলেন!";
                    setTimeout(bowl, 2000); // ২ সেকেন্ড পর আবার বল হবে
                }
            }
            requestAnimationFrame(gameLoop);
        }

        // শট খেলার লজিক (বাটন প্রেস)
        window.addEventListener('keydown', (e) => {
            // নোকিয়া ৫ বাটন অথবা ArrowUp চাপলে শট খেলবে
            if ((e.key === '5' || e.key === 'ArrowUp') && canHit && isBallLive) {
                canHit = false;
                
                // ব্যাটের অ্যানিমেশন (ঘুরবে)
                bat.style.transform = "rotate(-90deg)";
                setTimeout(() => { bat.style.transform = "rotate(0deg)"; }, 150);

                // টাইমিং চেক (বল যখন ব্যাটসম্যানের ঠিক সামনে থাকবে)
                // ব্যাটসম্যানের পজিশন পিচের ১৯০-২০৫ পিক্সেলের মধ্যে
                if (ballY >= 180 && ballY <= 200) {
                    isBallLive = false;
                    ball.style.display = 'none';
                    
                    // পারফেক্ট টাইমিং অনুযায়ী রান
                    let rand = Math.random();
                    if (rand > 0.6) {
                        score += 6;
                        statusText.innerText = "ছক্কা!! বিশাল শট!";
                    } else if (rand > 0.2) {
                        score += 4;
                        statusText.innerText = "চার!! সীমানার বাইরে!";
                    } else {
                        score += 1;
                        statusText.innerText = "১ রান নিলেন।";
                    }
                    scoreText.innerText = score;
                    setTimeout(bowl, 2000);
                } 
                // ভুল টাইমিং (ক্যাচ আউট)
                else if (ballY >= 160 && ballY < 180) {
                    isBallLive = false;
                    ball.style.display = 'none';
                    wickets++;
                    wicketsText.innerText = wickets;
                    statusText.innerText = "আউট!! মিসটাইমিং, ক্যাচ উঠে গেছে!";
                    setTimeout(bowl, 2000);
                }
            }
        });

        // গেমটি শুরু করা
        gameLoop();
        setTimeout(bowl, 1000); // ১ সেকেন্ড পর প্রথম বল করা হবে
    </script>
</body>
</html>
